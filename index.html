<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Friendli" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Friendli</title>
    <style>
      html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
      /* Default to orange gradient (login page is first thing users see) */
      html { background: linear-gradient(135deg, #D4803F, #E04A2B); }
      /* On desktop (>430px), use navy frame */
      @media (min-width: 430px) { html { background: #0D3B66; } }
      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
