<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;height:100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Friendli" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Friendli</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { margin: 0; padding: 0; height: 100%; background: #D4803F; }

      #root { min-height: 100%; min-height: 100dvh; display: flex; flex-direction: column; }
      @media (min-width: 430px) { html { background: #0D3B66; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
