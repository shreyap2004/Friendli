<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="friendli" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>friendli</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }
      /* Use CSS custom property set by JS for exact viewport height */
      html, body, #root {
        height: 100vh;
        height: var(--vh, 100vh);
      }
      #root {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
    </style>
    <script>
      // Set --vh to the actual visible viewport height in pixels.
      // This is the nuclear fix for iOS Safari viewport issues.
      // window.innerHeight gives the exact pixel height of the visible area.
      function setVH() {
        var vh = window.innerHeight;
        document.documentElement.style.setProperty('--vh', vh + 'px');
        document.documentElement.style.height = vh + 'px';
        document.body.style.height = vh + 'px';
      }
      setVH();
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', function() {
        setTimeout(setVH, 100);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
